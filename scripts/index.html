<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body>
<script>
const API_BASE = "https://ktmb-api-769756648802.us-central1.run.app/api";
const STORAGE_KEY = "ktmb_last_result";

function malaysiaDate(offsetDays = 0) {
  const now = new Date();
  const myTime = new Date(now.getTime() + 8 * 60 * 60 * 1000 + offsetDays * 86400000);
  return myTime.toISOString().slice(0, 10);
}

// Resolves any user-supplied date string to YYYY-MM-DD in Malaysia time.
// Handles: omitted/null → today, "today", "tomorrow", day names ("Monday",
// "this Friday", "next Wednesday"), or a passthrough YYYY-MM-DD string.
function resolveDate(input) {
  if (!input) return malaysiaDate();

  const s = input.trim().toLowerCase();
  if (s === "today") return malaysiaDate();
  if (s === "tomorrow") return malaysiaDate(1);
  if (s === "yesterday") return malaysiaDate(-1);

  // Already an absolute date
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;

  // Day name resolution — find the next occurrence of the named weekday
  const DAY_NAMES = ["sunday","monday","tuesday","wednesday","thursday","friday","saturday"];
  // Strip optional "this"/"next" prefix before the day name
  const dayWord = s.replace(/^(this|next)\s+/, "");
  const targetDay = DAY_NAMES.indexOf(dayWord);
  if (targetDay !== -1) {
    const now = new Date();
    const myTime = new Date(now.getTime() + 8 * 60 * 60 * 1000);
    const todayDay = myTime.getUTCDay();
    let daysAhead = targetDay - todayDay;
    if (daysAhead < 0) daysAhead += 7; // wrap to next week only if already passed
    return malaysiaDate(daysAhead);
  }

  // Fallback: return as-is and let the API handle or reject it
  return input.trim();
}

function formatTime(t) {
  if (!t) return "N/A";
  return t.length > 5 ? t.slice(0, 5) : t;
}

// Returns all stations that match the query, ordered by match quality.
// The unfiltered station list may contain the same station name multiple
// times with different stop_ids (one per service type), so returning all
// candidates lets callers try each one until the schedule API responds.
function fuzzyMatchAll(query, stations) {
  const q = query.toLowerCase().trim();

  let matches = stations.filter(s => s.stop_name.toLowerCase() === q);
  if (matches.length) return matches;

  matches = stations.filter(s => s.stop_name.toLowerCase().startsWith(q));
  if (matches.length) return matches;

  matches = stations.filter(s => s.stop_name.toLowerCase().includes(q));
  if (matches.length) return matches;

  const tokens = q.split(/\s+/);
  let best = [], bestScore = 0;
  for (const s of stations) {
    const name = s.stop_name.toLowerCase();
    const score = tokens.filter(t => name.includes(t)).length;
    if (score > bestScore) { bestScore = score; best = [s]; }
    else if (score === bestScore && score > 0) best.push(s);
  }
  return best;
}

async function fetchStations(service_type) {
  const url = service_type
    ? `${API_BASE}/stations?service_type=${encodeURIComponent(service_type)}`
    : `${API_BASE}/stations`;
  const res = await fetch(url);
  if (!res.ok) throw new Error("Failed to fetch stations.");
  return res.json();
}

function trainNum(trip_id) {
  return trip_id ? trip_id.replace(/^(weekday|weekend)_/i, "") : "?";
}

function serviceTag(t) {
  const raw = (t.route_short_name || t.route_long_name || "").toLowerCase();
  if (raw.includes("ets")) return "ETS";
  if (raw.includes("intercity") || raw.includes("interciti")) return "Intercity";
  if (raw.includes("komuter")) return "Komuter";
  // Fallback: infer from train number prefix (EP/EG = ETS)
  const num = trainNum(t.trip_id).toUpperCase();
  if (/^E[PG]/.test(num)) return "ETS";
  return t.route_short_name || t.route_long_name || "KTM";
}

async function nextTrain({ from, to, service_type }) {
  if (!from || !to) return { error: "Both 'from' and 'to' are required." };
  const stations = await fetchStations();
  const fromCandidates = fuzzyMatchAll(from, stations);
  const toCandidates = fuzzyMatchAll(to, stations);
  if (!fromCandidates.length) return { error: `Could not find a station matching "${from}".` };
  if (!toCandidates.length) return { error: `Could not find a station matching "${to}".` };

  for (const fromSt of fromCandidates) {
    for (const toSt of toCandidates) {
      let nextUrl = `${API_BASE}/schedule/next?from=${encodeURIComponent(fromSt.stop_id)}&to=${encodeURIComponent(toSt.stop_id)}`;
      if (service_type) nextUrl += `&service_type=${encodeURIComponent(service_type)}`;
      const res = await fetch(nextUrl);
      if (res.status === 404) continue;
      if (!res.ok) throw new Error(`API error: ${res.status}`);
      const trip = await res.json();
      const t = Array.isArray(trip) ? trip[0] : trip;
      if (!t) continue;

      const payload = {
        view: "next_train",
        from: fromSt.stop_name,
        to: toSt.stop_name,
        trips: [{
          train: trainNum(t.trip_id),
          service: serviceTag(t),
          departs: formatTime(t.departure_time),
          arrives: formatTime(t.arrival_time),
          headsign: t.trip_headsign || null,
        }],
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));

      const textLines = [
        `Next train from ${fromSt.stop_name} to ${toSt.stop_name}:`,
        `• Train: ${payload.trips[0].train} (${payload.trips[0].service})`,
        `• Departs: ${payload.trips[0].departs}`,
        `• Arrives: ${payload.trips[0].arrives}`,
        payload.trips[0].headsign ? `• Direction: ${payload.trips[0].headsign}` : null,
      ].filter(Boolean);

      return { result: textLines.join("\n"), webview: { url: "schedule.html", aspectRatio: 0.6 } };
    }
  }

  return { result: `No upcoming trains from ${fromCandidates[0].stop_name} to ${toCandidates[0].stop_name} today.` };
}

async function searchTrains({ from, to, date, time, service_type }) {
  if (!from || !to) return { error: "Both 'from' and 'to' are required." };
  const resolvedDate = resolveDate(date);
  const stations = await fetchStations();
  const fromCandidates = fuzzyMatchAll(from, stations);
  const toCandidates = fuzzyMatchAll(to, stations);
  if (!fromCandidates.length) return { error: `Could not find a station matching "${from}".` };
  if (!toCandidates.length) return { error: `Could not find a station matching "${to}".` };

  for (const fromSt of fromCandidates) {
    for (const toSt of toCandidates) {
      let url = `${API_BASE}/schedule/search?from=${encodeURIComponent(fromSt.stop_id)}&to=${encodeURIComponent(toSt.stop_id)}&date=${encodeURIComponent(resolvedDate)}`;
      if (time) url += `&time=${encodeURIComponent(time)}`;
      if (service_type) url += `&service_type=${encodeURIComponent(service_type)}`;

      const res = await fetch(url);
      if (!res.ok) throw new Error(`API error: ${res.status}`);
      const body = await res.json();
      const trips = Array.isArray(body) ? body : (body.trips || []);
      if (trips.length === 0) continue;

      const total = trips.length;
      const shown = trips.slice(0, 12);

      const payload = {
        view: "search_trains",
        from: fromSt.stop_name,
        to: toSt.stop_name,
        date: resolvedDate,
        total,
        trips: shown.map(t => ({
          train: trainNum(t.trip_id),
          service: serviceTag(t),
          departs: formatTime(t.departure_time),
          arrives: formatTime(t.arrival_time),
          headsign: t.trip_headsign || null,
        })),
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));

      const textLines = shown.map(t => {
        const svc = t.route_short_name || t.route_long_name || "KTM";
        return `• ${formatTime(t.departure_time)} → ${formatTime(t.arrival_time)}  Train ${trainNum(t.trip_id)} (${svc})`;
      });

      let result = `Trains from ${fromSt.stop_name} to ${toSt.stop_name} on ${resolvedDate}:\n\n` + textLines.join("\n");
      if (total > 12) result += `\n\n...and ${total - 12} more. Add a time filter to narrow results.`;

      return { result, webview: { url: "schedule.html", aspectRatio: Math.min(0.5 + shown.length * 0.07, 1.5) } };
    }
  }

  return { result: `No trains found from ${fromCandidates[0].stop_name} to ${toCandidates[0].stop_name} on ${resolvedDate}.` };
}

async function departureBoard({ station, direction, service_type }) {
  if (!station) return { error: "A 'station' name is required." };
  const stations = await fetchStations();
  const candidates = fuzzyMatchAll(station, stations);
  if (!candidates.length) return { error: `Could not find a station matching "${station}".` };

  for (const matched of candidates) {
    let url = `${API_BASE}/schedule/list?from=${encodeURIComponent(matched.stop_id)}`;
    if (direction) url += `&direction=${encodeURIComponent(direction)}`;
    if (service_type) url += `&service_type=${encodeURIComponent(service_type)}`;

    const res = await fetch(url);
    if (!res.ok) throw new Error(`API error: ${res.status}`);
    const departures = await res.json();
    if (!departures || departures.length === 0) continue;

    const shown = departures.slice(0, 12);

    const payload = {
      view: "departure_board",
      station: matched.stop_name,
      trips: shown.map(d => ({
        train: trainNum(d.trip_id),
        service: serviceTag(d),
        departs: formatTime(d.departure_time),
        arrives: formatTime(d.arrival_time),
        headsign: d.trip_headsign || null,
      })),
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));

    const textLines = shown.map(d => {
      const svc = d.route_short_name || d.route_long_name || "KTM";
      const dest = d.trip_headsign ? ` → ${d.trip_headsign}` : "";
      return `• ${formatTime(d.departure_time)}  Train ${trainNum(d.trip_id)}  ${svc}${dest}`;
    });

    return {
      result: `Departures from ${matched.stop_name}:\n\n` + textLines.join("\n"),
      webview: { url: "schedule.html", aspectRatio: Math.min(0.5 + shown.length * 0.07, 1.5) },
    };
  }

  return { result: `No upcoming departures found from ${candidates[0].stop_name}.` };
}

window["ai_edge_gallery_get_result"] = async (data) => {
  try {
    const input = JSON.parse(data);
    let { action } = input;

    // Normalize action string — the model sometimes uses camelCase, kebab-case,
    // or partial names (e.g. "nextTrain", "next-train", "search", "board").
    if (action) {
      const a = action.toLowerCase().replace(/[-_\s]/g, "");
      if (a === "nexttrain" || a === "next") action = "next_train";
      else if (a === "searchtrains" || a === "search" || a === "trains") action = "search_trains";
      else if (a === "departureboard" || a === "departure" || a === "board") action = "departure_board";
    }

    // Infer action from parameters when the model omits it
    if (!action) {
      if (input.from && input.to) {
        action = (input.date || input.time) ? "search_trains" : "next_train";
      } else {
        action = "departure_board";
      }
    }

    // Normalize: departure_board expects `station`, but the model sometimes
    // passes `from` (or `to`) instead. Map whichever is present.
    if (action === "departure_board" && !input.station) {
      input.station = input.from || input.to;
    }

    let response;
    if (action === "next_train") {
      response = await nextTrain(input);
      // If no upcoming trains found today, fall back to the full day schedule
      if (response.result && response.result.startsWith("No upcoming trains")) {
        response = await searchTrains({ ...input, date: input.date || malaysiaDate() });
      }
    } else if (action === "search_trains") response = await searchTrains(input);
    else if (action === "departure_board") response = await departureBoard(input);
    else response = { error: `Unknown action "${action}". Use "next_train", "search_trains", or "departure_board".` };

    return JSON.stringify(response);
  } catch (err) {
    return JSON.stringify({ error: err.message || "An unexpected error occurred." });
  }
};
</script>
