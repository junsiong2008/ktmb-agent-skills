<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KTMB Schedule</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d1117;
    color: #e6edf3;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 13px;
    padding: 12px;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .ktm-badge {
    background: #1565c0;
    color: #fff;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.5px;
    padding: 4px 8px;
    border-radius: 5px;
    flex-shrink: 0;
  }
  .header-route {
    font-size: 14px;
    font-weight: 700;
    color: #e6edf3;
    line-height: 1.3;
  }
  .header-count { font-size: 12px; font-weight: 400; color: #8b949e; }
  .header-sub   { font-size: 12px; color: #8b949e; margin-top: 2px; }

  /* ── Trip list ── */
  .trip-list { display: flex; flex-direction: column; gap: 6px; }

  .trip-row {
    display: flex;
    align-items: center;
    background: #161b22;
    border: 1px solid #21262d;
    border-radius: 10px;
    padding: 10px 12px;
    gap: 12px;
  }

  /* Train number badge */
  .train-badge {
    background: #1e3a5f;
    color: #90caf9;
    font-size: 13px;
    font-weight: 800;
    border-radius: 7px;
    padding: 6px 8px;
    min-width: 48px;
    text-align: center;
    flex-shrink: 0;
    letter-spacing: -0.3px;
  }

  /* Destination + route label */
  .trip-info { flex: 1; overflow: hidden; min-width: 0; }
  .trip-dest {
    font-size: 12px;
    font-weight: 700;
    color: #e6edf3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    text-transform: uppercase;
    letter-spacing: 0.2px;
  }
  .trip-route {
    display: flex;
    align-items: center;
    gap: 4px;
    margin-top: 3px;
    font-size: 10px;
    color: #8b949e;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .route-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #4493f8;
    flex-shrink: 0;
  }

  /* Times section */
  .trip-times {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }
  .time-block { text-align: center; }
  .time-val {
    font-size: 17px;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.5px;
    color: #e6edf3;
  }
  .time-label {
    font-size: 9px;
    color: #8b949e;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 2px;
  }
  .duration-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }
  .duration-pill {
    background: #21262d;
    color: #8b949e;
    font-size: 9px;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 10px;
    white-space: nowrap;
  }
  .duration-arrow { font-size: 12px; color: #484f58; }

  /* ── Hero card (next train) ── */
  .hero {
    background: linear-gradient(135deg, #1565c0 0%, #0d47a1 100%);
    border-radius: 12px;
    padding: 14px 16px;
  }
  .hero-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.7; margin-bottom: 8px; }
  .hero-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
  }
  .hero-badge {
    background: rgba(255,255,255,0.15);
    color: #fff;
    font-size: 16px;
    font-weight: 800;
    border-radius: 8px;
    padding: 8px 10px;
    flex-shrink: 0;
  }
  .hero-info { flex: 1; }
  .hero-dest { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px; }
  .hero-route { font-size: 11px; opacity: 0.7; margin-top: 3px; }
  .hero-times {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
  }
  .hero-time-val  { font-size: 26px; font-weight: 800; font-variant-numeric: tabular-nums; letter-spacing: -0.5px; }
  .hero-time-label { font-size: 10px; opacity: 0.65; margin-top: 2px; }
  .hero-dur { display: flex; flex-direction: column; align-items: center; gap: 3px; flex: 1; }
  .hero-dur-pill {
    background: rgba(255,255,255,0.15);
    font-size: 10px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 10px;
  }
  .hero-dur-arrow { font-size: 14px; opacity: 0.5; }

  /* ── Empty state ── */
  .empty { text-align: center; padding: 32px 16px; color: #8b949e; }
</style>
</head>
<body>
<script>
  const STORAGE_KEY = "ktmb_last_result";

  // Parse "HH:MM" or "HH:MM:SS" → total minutes
  function toMinutes(t) {
    if (!t) return null;
    const parts = t.split(":").map(Number);
    return parts[0] * 60 + parts[1];
  }

  function duration(departs, arrives) {
    const d = toMinutes(departs), a = toMinutes(arrives);
    if (d == null || a == null) return null;
    let diff = a - d;
    if (diff < 0) diff += 24 * 60; // past midnight
    if (diff === 0) return null;
    const h = Math.floor(diff / 60), m = diff % 60;
    return h > 0 ? `${h}h ${m}m` : `${m}m`;
  }

  function tripRow(t) {
    const dur = duration(t.departs, t.arrives);
    const dest = t.headsign
      ? `To ${t.headsign.replace(/^.*ke\s+/i, "").toUpperCase()}`
      : `Train ${t.train}`;

    return `
      <div class="trip-row">
        <div class="train-badge">${t.train}</div>
        <div class="trip-info">
          <div class="trip-dest">${dest}</div>
          <div class="trip-route">
            <span class="route-dot"></span>
            <span>${t.headsign || t.service}</span>
          </div>
        </div>
        <div class="trip-times">
          <div class="time-block">
            <div class="time-val">${t.departs}</div>
            <div class="time-label">Departure</div>
          </div>
          <div class="duration-block">
            ${dur ? `<span class="duration-pill">${dur}</span>` : ""}
            <span class="duration-arrow">→</span>
          </div>
          <div class="time-block">
            <div class="time-val">${t.arrives || "—"}</div>
            <div class="time-label">Arrival</div>
          </div>
        </div>
      </div>
    `;
  }

  function render(data) {
    const root = document.body;
    if (!data || !data.trips || data.trips.length === 0) {
      root.innerHTML = `<div class="empty">No schedule data available.</div>`;
      return;
    }

    if (data.view === "next_train") {
      const t = data.trips[0];
      const dur = duration(t.departs, t.arrives);
      const dest = t.headsign
        ? `To ${t.headsign.replace(/^.*ke\s+/i, "").toUpperCase()}`
        : `Train ${t.train}`;

      root.innerHTML = `
        <div class="header">
          <span class="ktm-badge">KTM</span>
          <div>
            <div class="header-route">${data.from} → ${data.to}</div>
            <div class="header-sub">Next departure</div>
          </div>
        </div>
        <div class="hero">
          <div class="hero-row">
            <div class="hero-badge">${t.train}</div>
            <div class="hero-info">
              <div class="hero-dest">${dest}</div>
              <div class="hero-route">${t.headsign || t.service}</div>
            </div>
          </div>
          <div class="hero-times">
            <div class="time-block">
              <div class="hero-time-val">${t.departs}</div>
              <div class="hero-time-label">Departure</div>
            </div>
            <div class="hero-dur">
              ${dur ? `<span class="hero-dur-pill">${dur}</span>` : ""}
              <span class="hero-dur-arrow">→</span>
            </div>
            <div class="time-block">
              <div class="hero-time-val">${t.arrives}</div>
              <div class="hero-time-label">Arrival</div>
            </div>
          </div>
        </div>
      `;
      return;
    }

    let headerHTML = "";
    if (data.view === "search_trains") {
      const countNote = data.total > data.trips.length
        ? `<span class="header-count"> (${data.trips.length} of ${data.total})</span>`
        : "";
      headerHTML = `
        <div class="header">
          <span class="ktm-badge">KTM</span>
          <div>
            <div class="header-route">${data.from} → ${data.to}${countNote}</div>
            <div class="header-sub">${data.date}</div>
          </div>
        </div>
      `;
    } else {
      headerHTML = `
        <div class="header">
          <span class="ktm-badge">KTM</span>
          <div>
            <div class="header-route">${data.station}</div>
            <div class="header-sub">Upcoming departures</div>
          </div>
        </div>
      `;
    }

    root.innerHTML = headerHTML +
      `<div class="trip-list">${data.trips.map(tripRow).join("")}</div>`;
  }

  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    render(raw ? JSON.parse(raw) : null);
  } catch (e) {
    document.body.innerHTML = `<div class="empty">Failed to load schedule data.</div>`;
  }
</script>
</body>
</html>
