<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KTMB Schedule</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d1117;
    color: #e6edf3;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 14px;
    padding: 14px;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }
  .ktm-badge {
    background: #1565c0;
    color: #fff;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.5px;
    padding: 4px 8px;
    border-radius: 5px;
    flex-shrink: 0;
  }
  .header-route {
    font-size: 14px;
    font-weight: 700;
    color: #e6edf3;
    line-height: 1.3;
  }
  .header-count {
    font-size: 12px;
    font-weight: 400;
    color: #8b949e;
  }
  .header-sub {
    font-size: 12px;
    color: #8b949e;
    margin-top: 2px;
  }

  /* ── Next train hero card ── */
  .hero {
    background: linear-gradient(135deg, #1565c0 0%, #0d47a1 100%);
    border-radius: 12px;
    padding: 16px 18px;
  }
  .hero-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    opacity: 0.7;
    margin-bottom: 8px;
  }
  .hero-times {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .hero-time { font-size: 32px; font-weight: 700; letter-spacing: -0.5px; font-variant-numeric: tabular-nums; }
  .hero-arrow { font-size: 20px; opacity: 0.5; }
  .hero-meta { font-size: 12px; opacity: 0.8; margin-bottom: 8px; }

  /* ── Trip list ── */
  .trip-list { display: flex; flex-direction: column; gap: 8px; }

  .trip-row {
    background: #161b22;
    border: 1px solid #21262d;
    border-radius: 10px;
    padding: 12px 14px;
  }

  /* Top line: times on left, pill on right */
  .trip-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 5px;
  }
  .trip-times {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .trip-time {
    font-size: 18px;
    font-weight: 700;
    color: #e6edf3;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.3px;
  }
  .trip-arrow { font-size: 13px; color: #484f58; }

  /* Bottom line: train number + headsign */
  .trip-bottom {
    font-size: 12px;
    color: #8b949e;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Service pill */
  .pill {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.3px;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .svc-komuter   { background: #1b5e20; color: #a5d6a7; }
  .svc-ets       { background: #e65100; color: #ffccbc; }
  .svc-intercity { background: #4a148c; color: #e1bee7; }
  .svc-ktm       { background: #1565c0; color: #bbdefb; }

  /* ── Empty state ── */
  .empty {
    text-align: center;
    padding: 32px 16px;
    color: #8b949e;
    font-size: 14px;
  }
</style>
</head>
<body>
<script>
  const STORAGE_KEY = "ktmb_last_result";

  function svcClass(service) {
    const s = (service || "").toLowerCase();
    if (s.includes("komuter")) return "svc-komuter";
    if (s.includes("ets")) return "svc-ets";
    if (s.includes("intercity")) return "svc-intercity";
    return "svc-ktm";
  }

  function pill(service) {
    return `<span class="pill ${svcClass(service)}">${service}</span>`;
  }

  function render(data) {
    const root = document.body;

    if (!data || !data.trips || data.trips.length === 0) {
      root.innerHTML = `<div class="empty">No schedule data available.</div>`;
      return;
    }

    if (data.view === "next_train") {
      const t = data.trips[0];
      root.innerHTML = `
        <div class="header">
          <span class="ktm-badge">KTM</span>
          <div>
            <div class="header-route">${data.from} → ${data.to}</div>
            <div class="header-sub">Next departure</div>
          </div>
        </div>
        <div class="hero">
          <div class="hero-label">Train ${t.train}</div>
          <div class="hero-times">
            <span class="hero-time">${t.departs}</span>
            <span class="hero-arrow">→</span>
            <span class="hero-time">${t.arrives}</span>
          </div>
          ${t.headsign ? `<div class="hero-meta">towards ${t.headsign}</div>` : ""}
          ${pill(t.service)}
        </div>
      `;
      return;
    }

    let headerHTML = "";
    if (data.view === "search_trains") {
      const countNote = data.total > data.trips.length
        ? `<span class="header-count"> (${data.trips.length} of ${data.total})</span>`
        : "";
      headerHTML = `
        <div class="header">
          <span class="ktm-badge">KTM</span>
          <div>
            <div class="header-route">${data.from} → ${data.to}${countNote}</div>
            <div class="header-sub">${data.date}</div>
          </div>
        </div>
      `;
    } else {
      headerHTML = `
        <div class="header">
          <span class="ktm-badge">KTM</span>
          <div>
            <div class="header-route">${data.station}</div>
            <div class="header-sub">Upcoming departures</div>
          </div>
        </div>
      `;
    }

    const rowsHTML = data.trips.map(t => {
      const bottom = [
        `Train ${t.train}`,
        t.headsign ? `· ${t.headsign}` : null,
      ].filter(Boolean).join(" ");

      return `
        <div class="trip-row">
          <div class="trip-top">
            <div class="trip-times">
              <span class="trip-time">${t.departs}</span>
              <span class="trip-arrow">→</span>
              <span class="trip-time">${t.arrives || "—"}</span>
            </div>
            ${pill(t.service)}
          </div>
          <div class="trip-bottom">${bottom}</div>
        </div>
      `;
    }).join("");

    root.innerHTML = headerHTML + `<div class="trip-list">${rowsHTML}</div>`;
  }

  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    render(raw ? JSON.parse(raw) : null);
  } catch (e) {
    document.body.innerHTML = `<div class="empty">Failed to load schedule data.</div>`;
  }
</script>
</body>
</html>
